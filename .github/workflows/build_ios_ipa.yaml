name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get Packages
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          cd Payload
          zip -r ../app.ipa .
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app.ipa